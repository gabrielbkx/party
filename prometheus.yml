global:
  scrape_interval: 10s # De quanto em quanto tempo ele vai bater na  API

scrape_configs:
  - job_name: 'api-festconnect-metrics'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # host.docker.internal é para o Docker conseguir acessar o localhost Windows
      - targets: ['host.docker.internal:8080']